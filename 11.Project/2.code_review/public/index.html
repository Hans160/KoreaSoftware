<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>코드 취약점 분석기</h1>
    <form id="codeForm">
        <textarea id="code" name="code" rows="15" cols="80" placeholder="소스코드를 입력하세요"></textarea><br>
        <button type="submit">분석시작</button>
    </form>
    <h2>코드 취약점 분석기</h2>
    <pre id="result">결과가 출력될곳</pre>
    <script>
        document.getElementById("codeForm").addEventListener("submit", async (ev)=> {
            ev.preventDefault();
            const code = document.getElementById("code").value;
            const result = document.getElementById("result");
            
            //백엔드에 요청
            // 1. fetch로 POST로 소스코드 내용을 다 보낸다
            const response = await fetch('api/codecheck', { 
                method: 'POST',
                headers: {
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    code: code
                })
            });
            
            //2. result에 결과를 표시한다.
            const data = await response.json();
            result.textContent = data.result;
            console.log(data);
        });
    </script>
</body>
</html>
