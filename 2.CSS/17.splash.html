<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            font-size: 2em;

            display: flex;
            justify-content: center;
            align-items: center

            z-index: 9999;

            animation-name: fadeOut;
            animation-duration: 1s;
            animation-timing-function: ease-in-out;
            animation-delay: 0s;
            animation-iteration-count: 1;
            animation-direction: normal;
            animation-fill-mode: forwards;

        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
            
        }
    </style>
</head>
<body>
    <div class="splash">로딩중.....</div>
    <div class="content">
        <h1>환영합니다!</h1>
        <p>여기는 메인 컨테츠 입니다</p>
    </div>
</body>
</html>
