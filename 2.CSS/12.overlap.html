<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .container {
            position: relative;
            height: 400px;
            margin: 30px;
        }
        .box1, .box2 {
            width: 100%;
            height: 100%;
            text-align: center;
            background-color: rgb(129, 194, 231);
            opacity: 0.6;
        }
        .box2 {
            background-color: greenyellow;
        }
        .overlay {
         
         top: 200px;
        }
        .box1:hover {
            z-index: 5;
            opacity: 1;
            transform-style: all;
            transition-duration: 2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">상단영역</div>
        <div class="box2 overlay">하단영역</div>
    </div>
</body>
</html>
