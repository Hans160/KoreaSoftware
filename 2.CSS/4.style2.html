<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        #my_bg_orange {
            border: 1px solid red;
            background-color: orange;
        }
        .my_bg_yellow {
            border: 2px dashed red;    /* solid, dashed, dotted, double,groove,ridge  */
            background-color: rgb(255, 228, 122);
        }
        .my_text_blue {
            color: blue;
        }
        .my_text_pink {
            color: rgb(255, 0, 255);
        }
        p {
            color: green
        }
    </style>

</head>
<body>
    <h1>CSS 연습</h1>
    <p class="my_bg_yellow">여기는 아무 문장이나 적으시오</p>
    <p>여기는 아무 문장이나 적으시오</p>
    <p class="my_bg_yellow my_text_blue" id="my_bg_orange">여기는 아무 문장이나 적으시오</p>
    <p class="my_text_pink">여기는 아무 문장이나 적으시오</p>
</body>
</html>
