<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사용자 조회 결과</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .error { color: red; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: blue; }
    </style>
</head>
<body>

    <h1>사용자 조회 정보</h1>

    <!-- 1. 특정 사용자 단일 조회 (/user/<user_id>) 처리 -->
    {% if user is not none %}
        <table>
            <tr><th>ID</th><td>{{ user.id }}</td></tr>
            <tr><th>이름</th><td>{{ user.name }}</td></tr>
            <tr><th>이메일</th><td>{{ user.email }}</td></tr>
        </table>

    <!-- 2. 전체 사용자 목록 조회 (/user) 처리 -->
    {% elif users is not none %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>이름</th>
                    <th>이메일</th>
                </tr>
            </thead>
            <tbody>
                {% for key, val in users.items() %}
                <tr>
                    <td>{{ val.id }}</td>
                    <!-- 이름을 누르면 해당 사용자의 상세 페이지로 이동 -->
                    <td><a href="/user/{{ val.id }}">{{ val.name }}</a></td>
                    <td>{{ val.email }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    <!-- 3. 사용자를 찾지 못한 경우 -->
    {% else %}
        <p class="error">존재하지 않는 사용자 정보입니다.</p>
    {% endif %}

    <a href="/" class="back-link">← 홈으로 돌아가기</a>

</body>
</html>
