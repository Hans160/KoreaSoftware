<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>상품 조회 결과</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .no-result { color: #666; font-style: italic; margin-top: 20px; }
        .back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: blue; }
    </style>
</head>
<body>

    <h1>상품 조회 정보</h1>

    <!-- 상품 데이터가 존재하는 경우 -->
    {% if products %}
        <table>
            <thead>
                <tr>
                    <th>상품 ID</th>
                    <th>상품명</th>
                    <th>가격 ($)</th>
                </tr>
            </thead>
            <tbody>
                {% for key, val in products.items() %}
                <tr>
                    <td>{{ val.id }}</td>
                    <td>{{ val.name }}</td>
                    <td>{{ val.price }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <!-- 검색 결과가 비어있는 경우 -->
        <p class="no-result">일치하는 상품 정보가 존재하지 않습니다.</p>
    {% endif %}

    <a href="/" class="back-link">← 홈으로 돌아가기</a>

</body>
</html>
