<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
        }

        .slider {
            display: flex;
            flex-direction: column;
            margin: 0 auto; 
            text-align: center;
            max-width: 600px;
            align-items: center;
        }

        .slider img {
            max-width: 100%;
            height: 300px;
            display: none;
        }

        .slider img.active {
            display: block;
        }

        .buttons {
            margin-top: 20px;
        }
        .button {
            text-align: center;
            padding: 10px;
            font-size: 16px;
           
        }
        .filename {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>이미지 슬라이더</h1>
    <div class="slider">
        <img id="img1" src="images/cat1.jpg" class="active" >
        <img id="img2" src="images/cat2.jpg" >
        <img id="img3" src="images/cat3.jpg" >
    </div>

    <div class="filename" id="filename">images/cat1.jpg</div>
  
    <div class="button">
        <button id="prevButton">이전</button>
        <button id="nextButton">다음</button>
    </div>
    <script>
        //클래스 액티브만 나타나게 하고 다음 버튼누르면 다음 이미지를 나타나게 하기
        const imgs =document.querySelectorAll('.slider img');

        const filename = document.getElementById('filename');
        const prevBtn = document.getElementById('prevButton');
        const nextBtn = document.getElementById('nextButton');

        let currentIndex = 0;

        function showImage(index) {
            imgs.forEach(img => img.classList.remove('active'));
            imgs[index].classList.add('active');
            filename.textContent = imgs[index].src.split('/').slice(-2).join('/');
        }
        
        nextBtn.addEventListener('click', () => {
            currentIndex++;
            if (currentIndex >= imgs.length) {
                currentIndex = 0;
            }
            showImage(currentIndex);
        });

        prevBtn.addEventListener('click', () => {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = imgs.length - 1;
            }
            showImage(currentIndex);
        })
    </script>
</body>
</html>
