<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"><!--데이터가 출력될 곳--></div>"
    <script>
        document.getElementById('loadBtn').addEventListener('click', async () => {
            try {
                const response = await fetch('http://jsonplaceholder.typicode.com/todos/1');
                
                if(!response.ok) {
                    console.log("응답은 왔으나, ok가 아님: ", response);
                    throw new Error("알 수 없는 오류가 발생했습니다");
                        
                }
                console.log("성공적인 응답이 왔음. 응답은 여기 담겨있음")

                const data = await response.json(); //응답이 JSON 형태로 왔을 때, JSON 객체로 변환
                console.log("최종 파싱이 끝난 JSON자료구조가 넘어옴", data);
                //이 받아온 데이터로 나의 DOM에 렌더링한다.
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                <ul>
                    <li>UserID: ${data.userId}</li>
                    <li>ID: ${data.id}</li>
                    <li>Title: ${data.title}</li>
                    <li>Completed: ${data.completed}</li>
                </ul>
                `

            } catch (error) {
                console.error("오류 발생:", error);
            }
        });
    </script>
</body>
</html>
