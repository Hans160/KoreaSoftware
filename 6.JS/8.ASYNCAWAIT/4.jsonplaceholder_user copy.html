<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <input type="number" id="uid">
    <button id="loadBtn">데이터 요청</button>
    <div id="result"><!--데이터가 출력될 곳--></div>"
    <script>
        
        document.getElementById('loadBtn').addEventListener('click', async () => {
            try {
                const userid = document.getElementById('uid').value;
    
                // 1. 데이터 요청
                const response = await fetch(`https://jsonplaceholder.typicode.com/users/${userid}`)
        
                const data = await response.json(); //응답이 JSON 형태로 왔을 때, JSON 객체로 변환
                console.log("최종 파싱이 끝난 JSON자료구조가 넘어옴", data);
      
                // 2. 넘겨받은 데이터로 화면 그리기
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                <ul>
                    <li>사용자ID : ${data.id}</li>
                    <ul>
                        <li>사용자 이름 : ${data.name}</li>
                        <li>전화번호 : ${data.phone}</li>
                        <li>웹사이트 : ${data.website}</li>
                    </ul>
                </ul>`;

            } catch (error) {    
                // 3. fetch, json 변환, 화면 그리기 중 발생하는 모든 에러를 여기서 잡음
                console.log("요청 또는 데이터 처리 과정 중 오류 발생: ", error);
            }
        });
    </script>
</body>
</html>
