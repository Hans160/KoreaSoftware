<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #myButton {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="myButton">마우스를 올려보세요</button>
    <script>
        document.getElementById('myButton').addEventListener('mouseover', (ev) => {
            ev.preventDefault(); // 기본 기능을 하지 못하게 함
            console.log('마우스가 올라갔어요.');

        });

        document.getElementById('myButton').addEventListener('mouseout', (ev) => {
           console.log("마우스가 나갔어요.");
        });

        document.getElementById('myButton').addEventListener('')
    </script>
</body>
</html>
