        console.log("0. 나는 헤더에 있는 스크립트 블럭");

        console.log("1번에서 시도 : ", mytitle)
    </script>
    <script>

            // HTML에 대한 DOM 로딩이 완료된 시점, ( css, Image 등은 로딩이 완료 안됐을 수 있음.)
            console.log('3. DOM 로딩 완료');
        })    
    </script>
    <script>
         console.log("2. 나는 BODY 맨 아래 있는 스크립트 블럭");
