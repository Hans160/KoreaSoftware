<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <button id="loadBtn">데이터 요청</button>
    <div id="result"><!--데이터가 출력될 곳--></div>"
    <script src="js/fetch.js">
        document.getElementById('loadBtn').addEventListener('click', () => {
            fetch('http://localhost:5000/api/data').then((response) => {
                if(!response.ok) {
                    console.log("응답은 왔으나, ok가 아님: ", response);
                    
                }
                return response.json(); //응답이 JSON 형태로 왔을 때, JSON 객체로 변환
            }).then(data) => {
                console.log("최종 파싱이 끝난 JSON자료구조가 넘어옴", data);
            }.catch((error) => {    
                console.error("위에 fetch를 처리하고 가공하는 과정중 어딘가에서 오류가 났음 ", error);
            })
        });
    </script>
</body>
</html>
